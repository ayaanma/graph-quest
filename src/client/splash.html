<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gradient Descent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, 'SFMono-Regular', 'Cascadia Code', monospace;
        --space: #050612;
        --cyan: #5cd6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--space);
      }

      body {
        display: grid;
        place-items: center;
      }

      .launch-screen {
        position: relative;
        isolation: isolate;
        display: flex;
        width: 100%;
        height: 100%;
        min-height: 240px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        text-align: center;
        background: #05060f;
      }

      .menu-backdrop {
        position: absolute;
        z-index: 0;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        image-rendering: pixelated;
      }

      .launch-card {
        position: relative;
        z-index: 2;
        display: flex;
        width: min(92vw, 720px);
        flex-direction: column;
        align-items: center;
        transform: translateY(-3px);
      }

      .title-logo {
        display: block;
        width: min(88vw, 620px);
        height: auto;
        image-rendering: pixelated;
      }

      .bitmap-text {
        display: block;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      .tagline {
        width: min(82vw, 496px);
        height: auto;
        margin: 11px 0 21px;
      }

      .level-preview {
        width: min(82vw, 440px);
        margin: 8px 0 13px;
      }

      .level-preview[hidden] {
        display: none;
      }

      .level-name {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        margin: 0 auto 6px;
        image-rendering: pixelated;
      }

      .level-canvas {
        display: block;
        width: 100%;
        height: auto;
        background: rgb(7 9 20 / 88%);
        image-rendering: pixelated;
      }

      .launch-screen.custom-level {
        padding-block: 10px;
      }

      .custom-level .launch-card {
        transform: none;
      }

      .custom-level .title-logo {
        /* Cap by width AND height (both auto) so the logo keeps its aspect while
           shrinking to fit shorter posts; full size on tall ones. */
        width: auto;
        height: auto;
        max-width: min(66vw, 380px);
        max-height: min(110px, 22vh);
      }

      .custom-level .tagline {
        display: none;
      }

      .custom-level .level-preview {
        width: min(74vw, 360px);
        margin: 4px 0 10px;
      }

      /* Cap the preview by viewport height (keeps the 360:176 game aspect) so the
         whole splash fits inside shorter "tall" posts instead of overflowing. */
      .custom-level .level-canvas {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: min(177px, 36vh);
        margin-inline: auto;
      }

      .custom-level .level-name {
        margin-bottom: 4px;
      }

      .custom-level .status {
        margin-top: 8px;
      }

      .play-button {
        position: relative;
        display: grid;
        width: min(82vw, 320px);
        height: 40px;
        place-items: center;
        border: 2px solid rgb(130 142 175 / 42%);
        border-radius: 0;
        padding: 0;
        background: rgb(255 255 255 / 3.5%);
        cursor: pointer;
        transition:
          transform 120ms ease,
          background-color 120ms ease,
          border-color 120ms ease;
      }

      .button-label {
        width: auto;
        height: 16px;
        max-width: calc(100% - 24px);
      }

      .play-button:hover {
        border-color: var(--cyan);
        background: rgb(255 255 255 / 7%);
        transform: translateY(-2px);
      }

      .play-button:focus-visible {
        outline: 3px solid #ffffff;
        outline-offset: 7px;
      }

      .play-button:active {
        transform: translateY(1px);
      }

      .play-button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 1.2em;
        margin: 13px 0 0;
        color: #ff9cab;
        font-size: 12px;
        font-weight: 700;
        text-shadow: 0 1px 2px #070914;
      }

      @media (max-height: 280px) {
        .launch-screen {
          padding: 14px 20px;
        }

        .title-logo {
          width: min(76vw, 500px);
        }

        .tagline {
          margin: 8px 0 12px;
        }

        .status {
          margin-top: 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .play-button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="launch-screen">
      <canvas
        class="menu-backdrop"
        id="menu-backdrop"
        width="384"
        height="288"
        aria-hidden="true"
      ></canvas>
      <section class="launch-card" aria-labelledby="game-title">
        <h1 id="game-title" hidden>Gradient Descent</h1>
        <img
          class="title-logo"
          src="/assets/2Fht7XQuao/my-files/gradient-descent-title-logo-110.png"
          alt="Gradient Descent"
          width="704"
          height="159"
        />
        <section class="level-preview" id="level-preview" hidden>
          <canvas
            class="bitmap-text level-name"
            id="level-name"
            data-variant="2"
            width="8"
            height="8"
            role="img"
            aria-label="Custom level"
          ></canvas>
          <canvas
            class="level-canvas"
            id="level-canvas"
            width="360"
            height="176"
            aria-label="Custom level preview"
          ></canvas>
        </section>
        <canvas
          class="bitmap-text tagline"
          data-text="trace the function to the stars"
          data-variant="4"
          width="248"
          height="8"
          role="img"
          aria-label="Trace the function to the stars"
        ></canvas>
        <button
          class="play-button"
          id="play"
          type="button"
          aria-label="Press to start"
        >
          <canvas
            class="bitmap-text button-label"
            data-text="PRESS TO START"
            data-variant="8"
            width="112"
            height="8"
            aria-hidden="true"
          ></canvas>
        </button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module">
      import { requestExpandedMode } from '@devvit/web/client';

      const playButton = document.querySelector('#play');
      const playButtonLabel = document.querySelector('.button-label');
      const status = document.querySelector('#status');
      const launchScreen = document.querySelector('.launch-screen');
      const levelPreview = document.querySelector('#level-preview');
      const levelName = document.querySelector('#level-name');
      const levelCanvas = document.querySelector('#level-canvas');
      const menuBackdrop = document.querySelector('#menu-backdrop');

      const backdropCtx = menuBackdrop.getContext('2d');
      const backdropStars = [];
      let starSeed = 0x47524144;
      const random = () => {
        starSeed = (Math.imul(starSeed, 1664525) + 1013904223) >>> 0;
        return starSeed / 4294967296;
      };
      for (let layer = 0; layer < 3; layer += 1) {
        for (let index = 0; index < 20; index += 1) {
          backdropStars.push({
            x: random() * 384,
            y: random() * 288,
            layer,
          });
        }
      }

      const drawPuff = (ctx, cx, cy, radius, red, green, blue) => {
        const rings = 7;
        for (let index = rings; index >= 1; index -= 1) {
          const ringRadius = (radius * index) / rings;
          const alpha = 0.05 * (1 - index / rings) + 0.015;
          ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      };

      const drawCircle = (ctx, x, y, radius, fill, stroke) => {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      };

      const drawMenuBackdrop = (time = 0) => {
        const gradient = backdropCtx.createLinearGradient(0, 0, 0, 288);
        gradient.addColorStop(0, '#0a0f24');
        gradient.addColorStop(0.55, '#070a18');
        gradient.addColorStop(1, '#04050d');
        backdropCtx.fillStyle = gradient;
        backdropCtx.fillRect(0, 0, 384, 288);

        backdropCtx.fillStyle = '#9fb2e8';
        for (const star of backdropStars) {
          const depth = star.layer + 1;
          const y = (star.y + time * 2.5 * depth * 0.32) % 288;
          backdropCtx.globalAlpha = 0.28 + depth * 0.18;
          const size = depth === 3 ? 2 : 1;
          backdropCtx.fillRect(Math.round(star.x), Math.round(y), size, size);
        }
        backdropCtx.globalAlpha = 1;

        drawPuff(
          backdropCtx,
          384 * 0.24 + Math.sin(time * 0.1) * 6,
          288 * 0.34,
          74,
          124,
          92,
          220,
        );
        drawPuff(
          backdropCtx,
          384 * 0.8 + Math.cos(time * 0.08) * 6,
          288 * 0.6,
          88,
          58,
          120,
          214,
        );

        const planetX = 384 * 0.15;
        const planetY = 288 * 0.74 + Math.sin(time * 0.6) * 2;
        drawCircle(
          backdropCtx,
          planetX,
          planetY,
          17,
          null,
          'rgba(122,150,220,0.22)',
        );
        drawCircle(backdropCtx, planetX, planetY, 14, 'rgba(88,140,220,0.10)');
        drawCircle(backdropCtx, planetX, planetY, 12, '#3a63b8');
        drawCircle(
          backdropCtx,
          planetX - 12 * 0.32,
          planetY - 12 * 0.34,
          12 * 0.3,
          'rgba(190,215,255,0.4)',
        );
      };

      const reduceMotion = window.matchMedia(
        '(prefers-reduced-motion: reduce)',
      ).matches;
      // The authored course to preview, set once /api/init resolves for a custom post.
      let previewLevel = null;
      const sceneStart = performance.now();
      const renderScene = (now) => {
        const t = reduceMotion ? 0 : (now - sceneStart) / 1000;
        drawMenuBackdrop(t);
        if (previewLevel) drawLevelPreview(previewLevel, t);
        if (!reduceMotion) requestAnimationFrame(renderScene);
      };
      requestAnimationFrame(renderScene);

      const gameFont = new Image();
      const drawBitmapText = (canvas) => {
        const text = canvas.dataset.text ?? '';
        const variant = Number(canvas.dataset.variant ?? 0);
        const cellSize = 8;
        canvas.width = text.length * cellSize;
        canvas.height = cellSize;

        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let index = 0; index < text.length; index += 1) {
          const glyph = text.charCodeAt(index) - 32;
          if (glyph < 0 || glyph >= 95) continue;
          ctx.drawImage(
            gameFont,
            glyph * cellSize,
            variant * cellSize,
            cellSize,
            cellSize,
            index * cellSize,
            0,
            cellSize,
            cellSize,
          );
        }
      };
      const setBitmapText = (canvas, text) => {
        canvas.dataset.text = text;
        if (gameFont.complete && gameFont.naturalWidth > 0)
          drawBitmapText(canvas);
      };
      gameFont.addEventListener('load', () => {
        document.querySelectorAll('.bitmap-text').forEach(drawBitmapText);
      });
      gameFont.src = '/assets/ui/game-font.png';

      // ── Custom-level preview ──────────────────────────────────────────────
      // Render the authored course the way the game's Play scene draws its graph:
      // the same 2.5D worldToScreen tilt, neon palette, ship glyph, diamond stars
      // and planet goal, into a native-resolution canvas that CSS upscales with
      // nearest-neighbour so it reads as the game's crisp pixel art.
      const GRAPH = { w: 360, h: 176 }; // graph viewport size (game src/config.ts)
      const X_MIN = -10,
        X_MAX = 10,
        Y_MIN = -8,
        Y_MAX = 8;
      const PERSP_FAR = 0.35,
        GRID_STEP = 2,
        GOAL_TOL = 0.4;
      const PREVIEW = {
        grid: 'rgba(122,150,220,0.09)',
        gridAxis: 'rgba(150,178,240,0.26)',
        accent: '#5cd6ff',
        accent2: '#a78bff',
        goal: '#6cffb0',
        star: '#ffd86b',
        obFill: 'rgba(255,107,107,0.09)',
        obEdge: 'rgba(255,130,120,0.5)',
      };
      const invDepth = (v) => 1 / (1 + PERSP_FAR * v);
      const NEAR = invDepth(0);
      const FARD = invDepth(1);
      // worldToScreen (game src/logic/projection.ts) in graph-local pixels: near
      // rows (low y) are wide, far rows foreshorten toward a horizon near the top.
      const project = (wx, wy) => {
        const u = (wx - X_MIN) / (X_MAX - X_MIN);
        const v = (wy - Y_MIN) / (Y_MAX - Y_MIN);
        const id = invDepth(v);
        const rowFrac = (NEAR - id) / (NEAR - FARD);
        return {
          x: GRAPH.w / 2 + (u - 0.5) * GRAPH.w * id,
          y: GRAPH.h - rowFrac * GRAPH.h,
        };
      };

      const strokeSeg = (ctx, ax, ay, bx, by, stroke, width) => {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
      };
      const fillDisc = (ctx, x, y, radius, fill) => {
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      };
      const strokeRing = (ctx, x, y, radius, stroke, width) => {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
      };
      const fillStrokePoly = (ctx, points, fill, stroke, width) => {
        ctx.beginPath();
        points.forEach((p, i) =>
          i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y),
        );
        ctx.closePath();
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = width;
          ctx.stroke();
        }
      };
      const diamond = (ctx, cx, cy, s, fill, edge) => {
        const inr = s * 0.4;
        fillStrokePoly(
          ctx,
          [
            { x: cx, y: cy - s },
            { x: cx + inr, y: cy - inr },
            { x: cx + s, y: cy },
            { x: cx + inr, y: cy + inr },
            { x: cx, y: cy + s },
            { x: cx - inr, y: cy + inr },
            { x: cx - s, y: cy },
            { x: cx - inr, y: cy - inr },
          ],
          fill,
          edge,
          1,
        );
      };
      // The player-ship glyph (game src/scenes/ship.ts): a neon dart with twin
      // fins, a cockpit and a pulsing thruster flame.
      const drawShip = (ctx, cx, cy, angle, time) => {
        const pulse = 0.5 + 0.5 * Math.sin(time * 7);
        const cos = Math.cos(angle),
          sin = Math.sin(angle);
        const p = (h, l) => ({
          x: cx + h * cos - l * sin,
          y: cy + h * sin + l * cos,
        });
        const hull = [
          p(-6, -2),
          p(-1, -3),
          p(7, 0),
          p(-1, 3),
          p(-6, 2),
          p(-4, 0),
        ];
        const finTop = [p(-4, -2), p(-7, -6), p(2, -3), p(1, -2)];
        const finBot = [p(-4, 2), p(-7, 6), p(2, 3), p(1, 2)];
        const flameTip = p(-10 - pulse * 2, 0),
          engine = p(-5, 0),
          flameCore = p(-9 - pulse * 2, 0);
        const cockpit = p(1, 0),
          ventA = p(-5, -1),
          ventB = p(-5, 1);
        fillDisc(ctx, cx, cy, 7 + pulse, 'rgba(92,214,255,0.08)');
        strokeSeg(
          ctx,
          flameTip.x,
          flameTip.y,
          engine.x,
          engine.y,
          'rgba(92,214,255,0.35)',
          3,
        );
        strokeSeg(
          ctx,
          flameCore.x,
          flameCore.y,
          engine.x,
          engine.y,
          PREVIEW.accent,
          1,
        );
        fillStrokePoly(ctx, finTop, '#d8f6ff', PREVIEW.accent2, 1);
        fillStrokePoly(ctx, finBot, '#d8f6ff', PREVIEW.accent2, 1);
        fillStrokePoly(ctx, hull, '#f8fcff', PREVIEW.accent2, 1);
        fillDisc(ctx, cockpit.x, cockpit.y, 1.5, PREVIEW.accent);
        strokeRing(ctx, cockpit.x, cockpit.y, 1.5, '#ffffff', 1);
        strokeSeg(
          ctx,
          ventA.x,
          ventA.y,
          ventB.x,
          ventB.y,
          'rgba(72,117,153,0.8)',
          1,
        );
      };
      // Ordered world-space boundary (game src/logic/obstacles.ts) for projection.
      const obstacleOutline = (o) => {
        if (o.kind === 'circle') {
          const steps = 28,
            points = [];
          for (let i = 0; i < steps; i += 1) {
            const a = -Math.PI / 2 + (i * Math.PI * 2) / steps;
            points.push({
              x: o.center.x + Math.cos(a) * o.radius,
              y: o.center.y + Math.sin(a) * o.radius,
            });
          }
          return points;
        }
        if (o.kind === 'triangle')
          return o.vertices.map((p) => ({ x: p.x, y: p.y }));
        return [
          { x: o.x0, y: o.y1 },
          { x: o.x1, y: o.y1 },
          { x: o.x1, y: o.y0 },
          { x: o.x0, y: o.y0 },
        ];
      };

      // A faint static starfield behind the grid, echoing the game's sky backdrop.
      const previewStars = [];
      let previewSeed = 0x9e3779b9;
      const previewRandom = () => {
        previewSeed = (Math.imul(previewSeed, 1664525) + 1013904223) >>> 0;
        return previewSeed / 4294967296;
      };
      for (let i = 0; i < 26; i += 1) {
        previewStars.push({
          x: Math.floor(previewRandom() * GRAPH.w),
          y: Math.floor(previewRandom() * GRAPH.h),
          alpha: 0.1 + previewRandom() * 0.16,
          size: previewRandom() < 0.28 ? 2 : 1,
        });
      }

      const drawLevelPreview = (level, time) => {
        const ctx = levelCanvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const w = GRAPH.w,
          h = GRAPH.h;

        // deep-indigo sky, matching the game's backdrop behind the graph
        const sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, '#0a0f24');
        sky.addColorStop(0.55, '#070a18');
        sky.addColorStop(1, '#04050d');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#9fb2e8';
        for (const st of previewStars) {
          ctx.globalAlpha = st.alpha;
          ctx.fillRect(st.x, st.y, st.size, st.size);
        }
        ctx.globalAlpha = 1;

        // tilted grid — horizontal rows, then perspective-fanned columns
        for (let y = Y_MIN; y <= Y_MAX + 1e-9; y += GRID_STEP) {
          const aL = project(X_MIN, y),
            aR = project(X_MAX, y);
          const axis = Math.abs(y) < 1e-6;
          strokeSeg(
            ctx,
            aL.x,
            aL.y,
            aR.x,
            aR.y,
            axis ? PREVIEW.gridAxis : PREVIEW.grid,
            1,
          );
        }
        for (let x = X_MIN; x <= X_MAX + 1e-9; x += GRID_STEP) {
          const col = Math.abs(x) < 1e-6 ? PREVIEW.gridAxis : PREVIEW.grid;
          let prev = project(x, Y_MIN);
          for (let y = Y_MIN + 1; y <= Y_MAX + 1e-9; y += 1) {
            const cur = project(x, y);
            strokeSeg(ctx, prev.x, prev.y, cur.x, cur.y, col, 1);
            prev = cur;
          }
        }

        for (const o of level.obstacles) {
          const poly = obstacleOutline(o).map((pt) => project(pt.x, pt.y));
          fillStrokePoly(ctx, poly, PREVIEW.obFill, PREVIEW.obEdge, 1);
        }

        // stars — floating diamonds with a twinkling core (game lifts them +0.35)
        level.stars.forEach((s, i) => {
          const twinkle = 0.5 + 0.5 * Math.sin(time * 3 + i * 1.7);
          const bob = Math.sin(time * 2 + i * 1.3) * 0.16;
          const p = project(s.x, s.y + bob + 0.35);
          diamond(ctx, p.x, p.y, 3.2, 'rgba(255,216,107,0.12)', PREVIEW.star);
          fillDisc(ctx, p.x, p.y, 0.8 + twinkle * 0.5, PREVIEW.star);
        });

        // goal — a small planet with a pulsing orbit ring
        const g = project(level.goal.x, level.goal.y);
        const gr = project(level.goal.x + GOAL_TOL, level.goal.y);
        const rad = Math.max(3, Math.abs(gr.x - g.x));
        const pulse = 0.5 + 0.5 * Math.sin(time * 3);
        strokeRing(ctx, g.x, g.y, rad + 1.5 + pulse * 2, PREVIEW.goal, 1);
        fillDisc(ctx, g.x, g.y, rad * 0.7 + 1, 'rgba(108,255,176,0.16)');
        fillDisc(ctx, g.x, g.y, Math.max(1.6, rad * 0.5), PREVIEW.goal);
        fillDisc(
          ctx,
          g.x - rad * 0.28,
          g.y - rad * 0.3,
          Math.max(0.7, rad * 0.24),
          'rgba(214,255,235,0.5)',
        );

        // start — the player ship parked on the launch pad
        const start = project(level.start.x, level.start.y);
        drawShip(ctx, start.x, start.y, 0, time);

        // pixel-art frame — a crisp 1px neon edge drawn in the pixel grid, matching
        // the game's panel strokes (no CSS border or glow, so it scales with the art)
        ctx.strokeStyle = PREVIEW.accent2;
        ctx.lineWidth = 1;
        ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
      };

      try {
        const response = await fetch('/api/init');
        if (response.ok) {
          const { customLevel } = await response.json();
          if (customLevel?.level && customLevel.author) {
            const heading = `${customLevel.author}'s Level`;
            setBitmapText(levelName, heading);
            levelName.style.width = heading.length * 16 + 'px'; // 2× the 8px cells
            levelName.setAttribute('aria-label', heading);
            levelCanvas.setAttribute(
              'aria-label',
              `${customLevel.author}'s custom level preview`,
            );
            previewLevel = customLevel.level;
            drawLevelPreview(previewLevel, 0);
            levelPreview.hidden = false;
            launchScreen.classList.add('custom-level');
            setBitmapText(playButtonLabel, 'LAUNCH LEVEL');
            playButton.setAttribute('aria-label', 'Launch level');
          }
        }
      } catch (error) {
        console.warn('Could not load custom level preview', error);
      }

      playButton.addEventListener('click', (event) => {
        playButton.disabled = true;
        status.textContent = 'Opening game…';

        try {
          requestExpandedMode(event, 'game');
        } catch (error) {
          console.error('Could not open Gradient Descent', error);
          playButton.disabled = false;
          status.textContent = 'Could not open the game. Please try again.';
        }
      });
    </script>
  </body>
</html>
