<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gradient Descent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, 'SFMono-Regular', 'Cascadia Code', monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #070914;
      }

      body {
        display: grid;
        place-items: center;
      }

      .launch-screen {
        position: relative;
        isolation: isolate;
        display: flex;
        width: 100%;
        height: 100%;
        min-height: 240px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        text-align: center;
        background:
          linear-gradient(180deg, rgb(7 9 20 / 18%), rgb(7 9 20 / 28%)),
          url('/assets/art/synthwave-horizon/bg-459a042e80.png') center 61% /
            cover no-repeat;
      }

      .launch-screen::before {
        position: absolute;
        z-index: -1;
        inset: 0;
        content: '';
        background:
          radial-gradient(
            circle at 50% 32%,
            rgb(92 214 255 / 22%),
            transparent 30%
          ),
          linear-gradient(
            180deg,
            rgb(7 9 20 / 15%) 0%,
            rgb(7 9 20 / 5%) 55%,
            rgb(7 9 20 / 52%) 100%
          );
      }

      .launch-card {
        display: flex;
        width: min(92vw, 720px);
        flex-direction: column;
        align-items: center;
        transform: translateY(-3px);
      }

      .title-logo {
        display: block;
        width: min(88vw, 620px);
        height: auto;
        image-rendering: pixelated;
        filter: drop-shadow(0 0 5px rgb(92 214 255 / 75%))
          drop-shadow(0 5px 0 rgb(29 12 73 / 90%));
      }

      .tagline {
        margin: 13px 0 18px;
        color: #d9f7ff;
        font-size: clamp(11px, 2.5vw, 15px);
        font-weight: 700;
        letter-spacing: 0.16em;
        line-height: 1.35;
        text-shadow: 0 0 8px rgb(92 214 255 / 90%);
        text-transform: uppercase;
      }

      .level-preview {
        width: min(82vw, 440px);
        margin: 8px 0 13px;
      }

      .level-preview[hidden] {
        display: none;
      }

      .level-name {
        margin: 0 0 5px;
        color: #ffffff;
        font-size: clamp(12px, 2.7vw, 16px);
        letter-spacing: 0.08em;
        line-height: 1.1;
        text-shadow: 0 0 8px rgb(92 214 255 / 90%);
      }

      .level-canvas {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #a78bff;
        border-radius: 3px;
        background: rgb(7 9 20 / 88%);
        box-shadow:
          0 0 0 2px rgb(7 9 20 / 80%),
          0 0 14px rgb(92 214 255 / 38%),
          inset 0 0 18px rgb(167 139 255 / 12%);
        image-rendering: pixelated;
      }

      .launch-screen.custom-level {
        padding-block: 10px;
      }

      .custom-level .launch-card {
        transform: none;
      }

      .custom-level .title-logo {
        width: min(66vw, 380px);
      }

      .custom-level .tagline {
        display: none;
      }

      .custom-level .level-preview {
        width: min(74vw, 360px);
        margin: 4px 0 10px;
      }

      .custom-level .level-name {
        margin-bottom: 3px;
        font-size: clamp(12px, 2.4vw, 14px);
      }

      .custom-level .play-button {
        min-height: 44px;
        padding-block: 9px;
      }

      .custom-level .status {
        margin-top: 8px;
      }

      .play-button {
        position: relative;
        min-width: min(78vw, 280px);
        min-height: 54px;
        border: 2px solid #5cd6ff;
        border-radius: 3px;
        padding: 13px 28px;
        color: #ffffff;
        background: linear-gradient(180deg, #4a2a91 0%, #29145d 100%);
        box-shadow:
          0 0 0 2px #070914,
          0 0 0 4px #a78bff,
          0 0 20px rgb(92 214 255 / 65%),
          inset 0 0 14px rgb(167 139 255 / 34%);
        cursor: pointer;
        font: inherit;
        font-size: clamp(15px, 3.3vw, 19px);
        font-weight: 900;
        letter-spacing: 0.16em;
        line-height: 1;
        text-shadow: 2px 2px 0 #301071;
        text-transform: uppercase;
        transition:
          transform 120ms ease,
          filter 120ms ease;
      }

      .play-button::before {
        margin-right: 10px;
        color: #6cffb0;
        content: '▶';
        text-shadow: 0 0 8px #6cffb0;
      }

      .play-button:hover {
        filter: brightness(1.18);
        transform: translateY(-2px);
      }

      .play-button:focus-visible {
        outline: 3px solid #ffffff;
        outline-offset: 7px;
      }

      .play-button:active {
        transform: translateY(1px);
      }

      .play-button:disabled {
        cursor: wait;
        filter: saturate(0.65);
      }

      .status {
        min-height: 1.2em;
        margin: 13px 0 0;
        color: #ff9cab;
        font-size: 12px;
        font-weight: 700;
        text-shadow: 0 1px 2px #070914;
      }

      @media (max-height: 280px) {
        .launch-screen {
          padding: 14px 20px;
        }

        .title-logo {
          width: min(76vw, 500px);
        }

        .tagline {
          margin: 8px 0 12px;
        }

        .play-button {
          min-height: 44px;
          padding-block: 9px;
        }

        .status {
          margin-top: 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .play-button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="launch-screen">
      <section class="launch-card" aria-labelledby="game-title">
        <h1 id="game-title" hidden>Gradient Descent</h1>
        <img
          class="title-logo"
          src="/assets/2Fht7XQuao/my-files/gradient-descent-title-logo-110.png"
          alt="Gradient Descent"
          width="704"
          height="159"
        />
        <section class="level-preview" id="level-preview" hidden>
          <h2 class="level-name" id="level-name"></h2>
          <canvas
            class="level-canvas"
            id="level-canvas"
            width="720"
            height="220"
            aria-label="Custom level preview"
          ></canvas>
        </section>
        <p class="tagline">Trace the function. Dodge the obstacles.</p>
        <button class="play-button" id="play" type="button">
          Play to start
        </button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module">
      import { requestExpandedMode } from '@devvit/web/client';

      const playButton = document.querySelector('#play');
      const status = document.querySelector('#status');
      const launchScreen = document.querySelector('.launch-screen');
      const levelPreview = document.querySelector('#level-preview');
      const levelName = document.querySelector('#level-name');
      const levelCanvas = document.querySelector('#level-canvas');

      const drawLevelPreview = (level) => {
        const ctx = levelCanvas.getContext('2d');
        const width = levelCanvas.width;
        const height = levelCanvas.height;
        const pad = 18;
        const sx = (x) => pad + ((x + 10) / 20) * (width - pad * 2);
        const sy = (y) => pad + ((8 - y) / 16) * (height - pad * 2);

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#070914';
        ctx.fillRect(0, 0, width, height);

        ctx.lineWidth = 1;
        for (let x = -10; x <= 10; x += 2) {
          ctx.strokeStyle = x === 0 ? '#4c5880' : '#242a4a';
          ctx.beginPath();
          ctx.moveTo(sx(x), sy(-8));
          ctx.lineTo(sx(x), sy(8));
          ctx.stroke();
        }
        for (let y = -8; y <= 8; y += 2) {
          ctx.strokeStyle = y === 0 ? '#4c5880' : '#242a4a';
          ctx.beginPath();
          ctx.moveTo(sx(-10), sy(y));
          ctx.lineTo(sx(10), sy(y));
          ctx.stroke();
        }

        ctx.fillStyle = 'rgb(255 107 122 / 30%)';
        ctx.strokeStyle = '#ff6b7a';
        ctx.lineWidth = 2;
        for (const obstacle of level.obstacles) {
          ctx.beginPath();
          if (obstacle.kind === 'circle') {
            ctx.ellipse(
              sx(obstacle.center.x),
              sy(obstacle.center.y),
              (obstacle.radius / 20) * (width - pad * 2),
              (obstacle.radius / 16) * (height - pad * 2),
              0,
              0,
              Math.PI * 2,
            );
          } else if (obstacle.kind === 'triangle') {
            obstacle.vertices.forEach((point, index) => {
              if (index === 0) ctx.moveTo(sx(point.x), sy(point.y));
              else ctx.lineTo(sx(point.x), sy(point.y));
            });
            ctx.closePath();
          } else {
            ctx.rect(
              sx(obstacle.x0),
              sy(obstacle.y1),
              sx(obstacle.x1) - sx(obstacle.x0),
              sy(obstacle.y0) - sy(obstacle.y1),
            );
          }
          ctx.fill();
          ctx.stroke();
        }

        for (const star of level.stars) {
          const x = sx(star.x);
          const y = sy(star.y);
          ctx.fillStyle = '#ffd86b';
          ctx.beginPath();
          ctx.moveTo(x, y - 6);
          ctx.lineTo(x + 6, y);
          ctx.lineTo(x, y + 6);
          ctx.lineTo(x - 6, y);
          ctx.closePath();
          ctx.fill();
        }

        const startX = sx(level.start.x);
        const startY = sy(level.start.y);
        ctx.fillStyle = '#5cd6ff';
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(startX + 8, startY);
        ctx.lineTo(startX - 6, startY - 6);
        ctx.lineTo(startX - 3, startY);
        ctx.lineTo(startX - 6, startY + 6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        const goalX = sx(level.goal.x);
        const goalY = sy(level.goal.y);
        ctx.fillStyle = 'rgb(108 255 176 / 22%)';
        ctx.strokeStyle = '#6cffb0';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(goalX, goalY, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#6cffb0';
        ctx.beginPath();
        ctx.arc(goalX, goalY, 4, 0, Math.PI * 2);
        ctx.fill();
      };

      try {
        const response = await fetch('/api/init');
        if (response.ok) {
          const { customLevel } = await response.json();
          if (customLevel?.level && customLevel.author) {
            levelName.textContent = `${customLevel.author}'s Level`;
            levelCanvas.setAttribute(
              'aria-label',
              `${customLevel.author}'s custom level preview`,
            );
            drawLevelPreview(customLevel.level);
            levelPreview.hidden = false;
            launchScreen.classList.add('custom-level');
            playButton.textContent = 'Play level';
          }
        }
      } catch (error) {
        console.warn('Could not load custom level preview', error);
      }

      playButton.addEventListener('click', (event) => {
        playButton.disabled = true;
        status.textContent = 'Opening game…';

        try {
          requestExpandedMode(event, 'game');
        } catch (error) {
          console.error('Could not open Gradient Descent', error);
          playButton.disabled = false;
          status.textContent = 'Could not open the game. Please try again.';
        }
      });
    </script>
  </body>
</html>
