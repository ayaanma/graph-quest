<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gradient Descent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, 'SFMono-Regular', 'Cascadia Code', monospace;
        --space: #050612;
        --cyan: #5cd6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--space);
      }

      body {
        display: grid;
        place-items: center;
      }

      .launch-screen {
        position: relative;
        isolation: isolate;
        display: flex;
        width: 100%;
        height: 100%;
        min-height: 240px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        text-align: center;
        background: #05060f;
      }

      .menu-backdrop {
        position: absolute;
        z-index: 0;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        image-rendering: pixelated;
      }

      .launch-card {
        position: relative;
        z-index: 2;
        display: flex;
        width: min(92vw, 720px);
        flex-direction: column;
        align-items: center;
        transform: translateY(-3px);
      }

      .title-logo {
        display: block;
        width: min(88vw, 620px);
        height: auto;
        image-rendering: pixelated;
      }

      .bitmap-text {
        display: block;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      .tagline {
        width: min(82vw, 496px);
        height: auto;
        margin: 11px 0 21px;
      }

      .level-preview {
        width: min(82vw, 440px);
        margin: 8px 0 13px;
      }

      .level-preview[hidden] {
        display: none;
      }

      .level-name {
        margin: 0 0 5px;
        color: #ffffff;
        font-size: clamp(12px, 2.7vw, 16px);
        letter-spacing: 0.08em;
        line-height: 1.1;
        text-shadow: 0 0 8px rgb(92 214 255 / 90%);
      }

      .level-canvas {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #a78bff;
        border-radius: 3px;
        background: rgb(7 9 20 / 88%);
        box-shadow:
          0 0 0 2px rgb(7 9 20 / 80%),
          0 0 14px rgb(92 214 255 / 38%),
          inset 0 0 18px rgb(167 139 255 / 12%);
        image-rendering: pixelated;
      }

      .launch-screen.custom-level {
        padding-block: 10px;
      }

      .custom-level .launch-card {
        transform: none;
      }

      .custom-level .title-logo {
        width: min(66vw, 380px);
      }

      .custom-level .tagline {
        display: none;
      }

      .custom-level .level-preview {
        width: min(74vw, 360px);
        margin: 4px 0 10px;
      }

      .custom-level .level-name {
        margin-bottom: 3px;
        font-size: clamp(12px, 2.4vw, 14px);
      }

      .custom-level .status {
        margin-top: 8px;
      }

      .play-button {
        position: relative;
        display: grid;
        width: min(82vw, 320px);
        height: 40px;
        place-items: center;
        border: 2px solid rgb(130 142 175 / 42%);
        border-radius: 0;
        padding: 0;
        background: rgb(255 255 255 / 3.5%);
        cursor: pointer;
        transition:
          transform 120ms ease,
          background-color 120ms ease,
          border-color 120ms ease;
      }

      .button-label {
        width: auto;
        height: 16px;
        max-width: calc(100% - 24px);
      }

      .play-button:hover {
        border-color: var(--cyan);
        background: rgb(255 255 255 / 7%);
        transform: translateY(-2px);
      }

      .play-button:focus-visible {
        outline: 3px solid #ffffff;
        outline-offset: 7px;
      }

      .play-button:active {
        transform: translateY(1px);
      }

      .play-button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 1.2em;
        margin: 13px 0 0;
        color: #ff9cab;
        font-size: 12px;
        font-weight: 700;
        text-shadow: 0 1px 2px #070914;
      }

      @media (max-height: 280px) {
        .launch-screen {
          padding: 14px 20px;
        }

        .title-logo {
          width: min(76vw, 500px);
        }

        .tagline {
          margin: 8px 0 12px;
        }

        .status {
          margin-top: 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .play-button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="launch-screen">
      <canvas
        class="menu-backdrop"
        id="menu-backdrop"
        width="384"
        height="288"
        aria-hidden="true"
      ></canvas>
      <section class="launch-card" aria-labelledby="game-title">
        <h1 id="game-title" hidden>Gradient Descent</h1>
        <img
          class="title-logo"
          src="/assets/2Fht7XQuao/my-files/gradient-descent-title-logo-110.png"
          alt="Gradient Descent"
          width="704"
          height="159"
        />
        <section class="level-preview" id="level-preview" hidden>
          <h2 class="level-name" id="level-name"></h2>
          <canvas
            class="level-canvas"
            id="level-canvas"
            width="720"
            height="220"
            aria-label="Custom level preview"
          ></canvas>
        </section>
        <canvas
          class="bitmap-text tagline"
          data-text="trace the function to the stars"
          data-variant="4"
          width="248"
          height="8"
          role="img"
          aria-label="Trace the function to the stars"
        ></canvas>
        <button
          class="play-button"
          id="play"
          type="button"
          aria-label="Press to start"
        >
          <canvas
            class="bitmap-text button-label"
            data-text="PRESS TO START"
            data-variant="8"
            width="112"
            height="8"
            aria-hidden="true"
          ></canvas>
        </button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module">
      import { requestExpandedMode } from '@devvit/web/client';

      const playButton = document.querySelector('#play');
      const playButtonLabel = document.querySelector('.button-label');
      const status = document.querySelector('#status');
      const launchScreen = document.querySelector('.launch-screen');
      const levelPreview = document.querySelector('#level-preview');
      const levelName = document.querySelector('#level-name');
      const levelCanvas = document.querySelector('#level-canvas');
      const menuBackdrop = document.querySelector('#menu-backdrop');

      const backdropCtx = menuBackdrop.getContext('2d');
      const backdropStars = [];
      let starSeed = 0x47524144;
      const random = () => {
        starSeed = (Math.imul(starSeed, 1664525) + 1013904223) >>> 0;
        return starSeed / 4294967296;
      };
      for (let layer = 0; layer < 3; layer += 1) {
        for (let index = 0; index < 20; index += 1) {
          backdropStars.push({
            x: random() * 384,
            y: random() * 288,
            layer,
          });
        }
      }

      const drawPuff = (ctx, cx, cy, radius, red, green, blue) => {
        const rings = 7;
        for (let index = rings; index >= 1; index -= 1) {
          const ringRadius = (radius * index) / rings;
          const alpha = 0.05 * (1 - index / rings) + 0.015;
          ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      };

      const drawCircle = (ctx, x, y, radius, fill, stroke) => {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      };

      const drawMenuBackdrop = (time = 0) => {
        const gradient = backdropCtx.createLinearGradient(0, 0, 0, 288);
        gradient.addColorStop(0, '#0a0f24');
        gradient.addColorStop(0.55, '#070a18');
        gradient.addColorStop(1, '#04050d');
        backdropCtx.fillStyle = gradient;
        backdropCtx.fillRect(0, 0, 384, 288);

        backdropCtx.fillStyle = '#9fb2e8';
        for (const star of backdropStars) {
          const depth = star.layer + 1;
          const y = (star.y + time * 2.5 * depth * 0.32) % 288;
          backdropCtx.globalAlpha = 0.28 + depth * 0.18;
          const size = depth === 3 ? 2 : 1;
          backdropCtx.fillRect(Math.round(star.x), Math.round(y), size, size);
        }
        backdropCtx.globalAlpha = 1;

        drawPuff(
          backdropCtx,
          384 * 0.24 + Math.sin(time * 0.1) * 6,
          288 * 0.34,
          74,
          124,
          92,
          220,
        );
        drawPuff(
          backdropCtx,
          384 * 0.8 + Math.cos(time * 0.08) * 6,
          288 * 0.6,
          88,
          58,
          120,
          214,
        );

        const planetX = 384 * 0.15;
        const planetY = 288 * 0.74 + Math.sin(time * 0.6) * 2;
        drawCircle(
          backdropCtx,
          planetX,
          planetY,
          17,
          null,
          'rgba(122,150,220,0.22)',
        );
        drawCircle(backdropCtx, planetX, planetY, 14, 'rgba(88,140,220,0.10)');
        drawCircle(backdropCtx, planetX, planetY, 12, '#3a63b8');
        drawCircle(
          backdropCtx,
          planetX - 12 * 0.32,
          planetY - 12 * 0.34,
          12 * 0.3,
          'rgba(190,215,255,0.4)',
        );
      };

      const reduceMotion = window.matchMedia(
        '(prefers-reduced-motion: reduce)',
      ).matches;
      const backdropStart = performance.now();
      const animateMenuBackdrop = (now) => {
        drawMenuBackdrop(reduceMotion ? 0 : (now - backdropStart) / 1000);
        if (!reduceMotion) requestAnimationFrame(animateMenuBackdrop);
      };
      requestAnimationFrame(animateMenuBackdrop);

      const gameFont = new Image();
      const drawBitmapText = (canvas) => {
        const text = canvas.dataset.text ?? '';
        const variant = Number(canvas.dataset.variant ?? 0);
        const cellSize = 8;
        canvas.width = text.length * cellSize;
        canvas.height = cellSize;

        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let index = 0; index < text.length; index += 1) {
          const glyph = text.charCodeAt(index) - 32;
          if (glyph < 0 || glyph >= 95) continue;
          ctx.drawImage(
            gameFont,
            glyph * cellSize,
            variant * cellSize,
            cellSize,
            cellSize,
            index * cellSize,
            0,
            cellSize,
            cellSize,
          );
        }
      };
      const setBitmapText = (canvas, text) => {
        canvas.dataset.text = text;
        if (gameFont.complete && gameFont.naturalWidth > 0)
          drawBitmapText(canvas);
      };
      gameFont.addEventListener('load', () => {
        document.querySelectorAll('.bitmap-text').forEach(drawBitmapText);
      });
      gameFont.src = '/assets/ui/game-font.png';

      const drawLevelPreview = (level) => {
        const ctx = levelCanvas.getContext('2d');
        const width = levelCanvas.width;
        const height = levelCanvas.height;
        const pad = 18;
        const sx = (x) => pad + ((x + 10) / 20) * (width - pad * 2);
        const sy = (y) => pad + ((8 - y) / 16) * (height - pad * 2);

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#070914';
        ctx.fillRect(0, 0, width, height);

        ctx.lineWidth = 1;
        for (let x = -10; x <= 10; x += 2) {
          ctx.strokeStyle = x === 0 ? '#4c5880' : '#242a4a';
          ctx.beginPath();
          ctx.moveTo(sx(x), sy(-8));
          ctx.lineTo(sx(x), sy(8));
          ctx.stroke();
        }
        for (let y = -8; y <= 8; y += 2) {
          ctx.strokeStyle = y === 0 ? '#4c5880' : '#242a4a';
          ctx.beginPath();
          ctx.moveTo(sx(-10), sy(y));
          ctx.lineTo(sx(10), sy(y));
          ctx.stroke();
        }

        ctx.fillStyle = 'rgb(255 107 122 / 30%)';
        ctx.strokeStyle = '#ff6b7a';
        ctx.lineWidth = 2;
        for (const obstacle of level.obstacles) {
          ctx.beginPath();
          if (obstacle.kind === 'circle') {
            ctx.ellipse(
              sx(obstacle.center.x),
              sy(obstacle.center.y),
              (obstacle.radius / 20) * (width - pad * 2),
              (obstacle.radius / 16) * (height - pad * 2),
              0,
              0,
              Math.PI * 2,
            );
          } else if (obstacle.kind === 'triangle') {
            obstacle.vertices.forEach((point, index) => {
              if (index === 0) ctx.moveTo(sx(point.x), sy(point.y));
              else ctx.lineTo(sx(point.x), sy(point.y));
            });
            ctx.closePath();
          } else {
            ctx.rect(
              sx(obstacle.x0),
              sy(obstacle.y1),
              sx(obstacle.x1) - sx(obstacle.x0),
              sy(obstacle.y0) - sy(obstacle.y1),
            );
          }
          ctx.fill();
          ctx.stroke();
        }

        for (const star of level.stars) {
          const x = sx(star.x);
          const y = sy(star.y);
          ctx.fillStyle = '#ffd86b';
          ctx.beginPath();
          ctx.moveTo(x, y - 6);
          ctx.lineTo(x + 6, y);
          ctx.lineTo(x, y + 6);
          ctx.lineTo(x - 6, y);
          ctx.closePath();
          ctx.fill();
        }

        const startX = sx(level.start.x);
        const startY = sy(level.start.y);
        ctx.fillStyle = '#5cd6ff';
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(startX + 8, startY);
        ctx.lineTo(startX - 6, startY - 6);
        ctx.lineTo(startX - 3, startY);
        ctx.lineTo(startX - 6, startY + 6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        const goalX = sx(level.goal.x);
        const goalY = sy(level.goal.y);
        ctx.fillStyle = 'rgb(108 255 176 / 22%)';
        ctx.strokeStyle = '#6cffb0';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(goalX, goalY, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#6cffb0';
        ctx.beginPath();
        ctx.arc(goalX, goalY, 4, 0, Math.PI * 2);
        ctx.fill();
      };

      try {
        const response = await fetch('/api/init');
        if (response.ok) {
          const { customLevel } = await response.json();
          if (customLevel?.level && customLevel.author) {
            levelName.textContent = `${customLevel.author}'s Level`;
            levelCanvas.setAttribute(
              'aria-label',
              `${customLevel.author}'s custom level preview`,
            );
            drawLevelPreview(customLevel.level);
            levelPreview.hidden = false;
            launchScreen.classList.add('custom-level');
            setBitmapText(playButtonLabel, 'LAUNCH LEVEL');
            playButton.setAttribute('aria-label', 'Launch level');
          }
        }
      } catch (error) {
        console.warn('Could not load custom level preview', error);
      }

      playButton.addEventListener('click', (event) => {
        playButton.disabled = true;
        status.textContent = 'Opening game…';

        try {
          requestExpandedMode(event, 'game');
        } catch (error) {
          console.error('Could not open Gradient Descent', error);
          playButton.disabled = false;
          status.textContent = 'Could not open the game. Please try again.';
        }
      });
    </script>
  </body>
</html>
